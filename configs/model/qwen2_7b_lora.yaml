base_model: Qwen/Qwen2.5-7B-Instruct
torch_dtype: bfloat16
use_flash_attention: true      # requires flash-attn; set false for TPU/L4 w/o CUDA 11.8
use_gradient_checkpointing: true
load_in_4bit: false            # set true for QLoRA on smaller GPUs
lora:
  enabled: true
  r: 16
  lora_alpha: 32
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
