base_model: meta-llama/Meta-Llama-3-8B-Instruct
torch_dtype: bfloat16
use_flash_attention: true
use_gradient_checkpointing: true
load_in_4bit: false
lora:
  enabled: true
  r: 16
  lora_alpha: 32
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  lora_dropout: 0.05
  bias: none
  task_type: CAUSAL_LM
