stage: sft
num_epochs: 5
per_device_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
lr_scheduler: cosine
warmup_ratio: 0.05
max_grad_norm: 1.0
save_steps: 200
eval_steps: 200
logging_steps: 20
bf16: true
dataloader_num_workers: 4
resume_from_checkpoint: null  # set to CPT checkpoint path for CPT -> SFT pipeline
