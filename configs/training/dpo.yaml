stage: dpo
num_epochs: 2
per_device_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 5.0e-5
lr_scheduler: cosine
warmup_ratio: 0.05
max_grad_norm: 1.0
save_steps: 100
eval_steps: 100
logging_steps: 10
bf16: true
dataloader_num_workers: 4
resume_from_checkpoint: null  # path to SFT checkpoint
beta: 0.1                     # DPO temperature
